<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="Food Lover - Fine Dining Restaurant" />
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D0D0D' width='100' height='100' rx='12'/><text x='50' y='68' text-anchor='middle' font-family='Georgia,serif' font-size='52' font-weight='bold' fill='%23D4A574'>F</text><circle cx='75' cy='28' r='8' fill='%23D4A574'/></svg>" type="image/svg+xml">
    <script>
      // Animated Image Favicon Script
      (function() {
        const img = new Image();
        img.src = '/favicon-img.png';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 64;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          
          let frame = 0;
          setInterval(() => {
            frame++;
            ctx.clearRect(0, 0, 64, 64);
            
            ctx.save();
            ctx.translate(32, 32); // Center of canvas
            
            const cycle = frame % 100; // Loop the entire sequence every 10 seconds
            let x = 0;
            let y = 0;
            let scale = 1;
            let rotate = 0;
            
            if (cycle < 15) {
              // 1. Coming from the north (emerging from top)
              y = -64 + (cycle / 15) * 64;
            } else if (cycle < 25) {
              // 2. Going to the right
              x = Math.sin((cycle - 15) / 10 * Math.PI) * 15; // Swings right
            } else if (cycle < 45) {
              // 3. Fluid "cut-off" roll (Smooth 360 degree spin)
              const t = (cycle - 25) / 20; // Progress from 0 to 1
              const easeOut = 1 - Math.pow(1 - t, 3); // Cubic ease out for fluid deceleration
              rotate = easeOut * Math.PI * 2; 
            } else {
              // 4. Fix it at the end with a continuous gentle movement
              const loopFrame = cycle - 45;
              scale = 0.9 + Math.abs(Math.sin(loopFrame * 0.15)) * 0.15;
              rotate = Math.sin(loopFrame * 0.1) * 0.15;
            }
            
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.rotate(rotate);
            
            // Draw image centered
            ctx.drawImage(img, -32, -32, 64, 64);
            ctx.restore();
            
            let link = document.getElementById('favicon');
            if (link) {
              link.href = canvas.toDataURL('image/png');
            }
          }, 100);
        };
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Food Lover | Fine Dining Restaurant</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
